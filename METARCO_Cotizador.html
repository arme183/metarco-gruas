<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>METARCO · Cotizador</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.28.1/lib/msal-browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-gradient:   radial-gradient(ellipse at 50% 80%, #1a3d6b 0%, #0a1628 70%);
      --card-bg:       #ffffff;
      --card-radius:   16px;
      --card-shadow:   0 4px 24px rgba(0,0,0,0.28);
      --card-padding:  24px;
      --text-light:    #ffffff;
      --text-muted:    rgba(255,255,255,0.6);
      --text-dark:     #1a1a2e;
      --text-gray:     #64748b;
      --blue-ms:       #0078d4;
      --blue-hover:    #106ebe;
      --color-ok:      #22c55e;
      --color-warn:    #f59e0b;
      --color-danger:  #ef4444;
      --border-light:  rgba(255,255,255,0.12);
      --border-card:   rgba(0,0,0,0.08);
      --font-brand:    'Orbitron', sans-serif;
      --font-ui:       'Inter', sans-serif;
      --sidebar-w:     220px;
      --header-h:      64px;
    }
    body { min-height:100vh; background:var(--bg-gradient); font-family:var(--font-ui); color:var(--text-light); line-height:1.5; }

    /* LOGIN */
    #loginScreen { display:flex; align-items:center; justify-content:center; min-height:100vh; }

    /* APP */
    #appShell { display:none; height:100vh; flex-direction:column; }
    #appShell.visible { display:flex; }

    /* HEADER */
    .app-header {
      height:var(--header-h); display:flex; align-items:center; justify-content:space-between;
      padding:0 28px; background:rgba(0,0,0,0.25); border-bottom:1px solid var(--border-light);
      flex-shrink:0; backdrop-filter:blur(8px);
    }
    .header-brand { display:flex; align-items:center; gap:14px; }
    .header-logo-box {
      width:38px; height:38px; border-radius:10px; overflow:hidden;
      background:linear-gradient(135deg,#0a1628,#1a3d6b);
      border:1px solid rgba(255,255,255,0.15);
    }
    .header-logo-box img { width:100%; height:100%; object-fit:cover; }
    .brand-name { font-family:var(--font-brand); font-weight:700; font-size:14px; letter-spacing:3px; }
    .brand-sub  { font-family:var(--font-brand); font-weight:700; font-size:9px; letter-spacing:2px; color:var(--text-muted); }
    .header-right { display:flex; align-items:center; gap:20px; }
    .sync-pill {
      display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-muted);
      background:rgba(255,255,255,0.06); border:1px solid var(--border-light);
      border-radius:20px; padding:5px 12px;
    }
    .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--color-ok); transition:background .3s; }
    .sync-dot.syncing { background:var(--color-warn); animation:blink 1s infinite; }
    .sync-dot.error   { background:var(--color-danger); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
    .user-chip {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.06); border:1px solid var(--border-light);
      border-radius:24px; padding:5px 14px 5px 6px;
    }
    .user-avatar { width:28px; height:28px; border-radius:50%; background:var(--blue-ms); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; color:#fff; }
    .user-name { font-size:13px; font-weight:600; }
    .user-role { font-size:10px; color:var(--text-muted); }

    /* LAYOUT */
    .app-body { display:flex; flex:1; overflow:hidden; }

    /* SIDEBAR */
    .sidebar { width:var(--sidebar-w); flex-shrink:0; background:rgba(0,0,0,0.2); border-right:1px solid var(--border-light); padding:20px 12px; overflow-y:auto; }
    .nav-label { font-family:var(--font-brand); font-size:8px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.35); padding:10px 12px 6px; }
    .nav-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px;
      font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer;
      transition:all .15s; border:none; background:transparent; width:100%; text-align:left; margin-bottom:2px;
    }
    .nav-item:hover { background:rgba(255,255,255,0.08); color:var(--text-light); }
    .nav-item.active { background:var(--blue-ms); color:#fff; }
    .nav-icon { font-size:15px; width:20px; text-align:center; }

    /* MAIN */
    .main-content { flex:1; overflow-y:auto; padding:28px 32px; }
    .sec-header { margin-bottom:24px; }
    .sec-title { font-family:var(--font-brand); font-weight:700; font-size:17px; letter-spacing:3px; }
    .sec-sub { font-size:12px; color:var(--text-muted); margin-top:5px; }

    /* CARDS */
    .card { background:var(--card-bg); border-radius:var(--card-radius); box-shadow:var(--card-shadow); padding:var(--card-padding); color:var(--text-dark); }
    .card-dark { background:rgba(255,255,255,0.06); border:1px solid var(--border-light); border-radius:var(--card-radius); padding:var(--card-padding); }
    .card-title { font-family:var(--font-brand); font-weight:700; font-size:11px; letter-spacing:1.5px; color:var(--text-dark); margin-bottom:16px; padding-bottom:12px; border-bottom:1px solid var(--border-card); }

    /* GRID */
    .g2 { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
    .g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }

    /* STAT */
    .stat-card { background:var(--card-bg); border-radius:12px; padding:16px 20px; color:var(--text-dark); box-shadow:0 2px 12px rgba(0,0,0,0.15); }
    .stat-val { font-family:var(--font-brand); font-weight:900; font-size:22px; color:var(--text-dark); }
    .stat-lbl { font-size:10px; color:var(--text-gray); margin-top:4px; text-transform:uppercase; letter-spacing:0.5px; }

    /* TABLE */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { font-family:var(--font-ui); font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-gray); border-bottom:1px solid var(--border-card); padding:10px 12px; text-align:left; }
    td { padding:11px 12px; border-bottom:1px solid var(--border-card); color:var(--text-dark); font-size:13px; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(0,120,212,0.04); }
    .tr-empty td { color:#94a3b8; text-align:center; padding:36px; }

    /* BADGES */
    .badge { display:inline-block; padding:2px 9px; border-radius:20px; font-weight:600; font-size:10px; letter-spacing:0.5px; text-transform:uppercase; }
    .b-admin    { background:rgba(59,130,246,0.18);  color:#93c5fd; }
    .b-operador { background:rgba(245,158,11,0.18);  color:#fcd34d; }
    .b-generada { background:rgba(59,130,246,0.15);  color:#60a5fa; }
    .b-aceptada { background:rgba(34,197,94,0.15);   color:#22c55e; }
    .b-ejecutada{ background:rgba(245,158,11,0.15);  color:#f59e0b; }
    .b-cobrada  { background:rgba(16,185,129,0.15);  color:#10b981; }
    .b-cancelada{ background:rgba(239,68,68,0.15);   color:#ef4444; }
    .b-t1       { background:rgba(0,120,212,0.15);   color:#60a5fa; }
    .b-t2       { background:rgba(245,158,11,0.18);  color:#fcd34d; }

    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; border:none; border-radius:10px; font-family:var(--font-ui); font-weight:600; font-size:13px; cursor:pointer; padding:10px 18px; transition:background .15s; }
    .btn-primary { background:var(--blue-ms); color:#fff; }
    .btn-primary:hover { background:var(--blue-hover); }
    .btn-ghost { background:rgba(255,255,255,0.1); color:var(--text-light); border:1px solid var(--border-light); }
    .btn-ghost:hover { background:rgba(255,255,255,0.18); }
    .btn-outline { background:transparent; color:var(--text-gray); border:1px solid var(--border-card); }
    .btn-outline:hover { background:rgba(0,120,212,0.08); color:var(--blue-ms); border-color:var(--blue-ms); }
    .btn-success { background:var(--color-ok); color:#fff; }
    .btn-danger  { background:var(--color-danger); color:#fff; }
    .btn-amber   { background:#f59e0b; color:#fff; }
    .btn-sm { padding:5px 11px; font-size:11px; border-radius:7px; }
    .btn-w100 { width:100%; }

    /* INPUTS */
    .inp, .sel, .textarea { width:100%; padding:10px 14px; border:1.5px solid var(--border-card); border-radius:10px; font-family:var(--font-ui); font-size:13px; color:var(--text-dark); background:#fff; outline:none; transition:border-color .15s; }
    .inp:focus, .sel:focus, .textarea:focus { border-color:var(--blue-ms); }
    .inp::placeholder { color:#94a3b8; }
    .textarea { resize:vertical; }
    .lbl { font-size:10px; font-weight:600; color:var(--text-gray); display:block; margin-bottom:6px; text-transform:uppercase; letter-spacing:0.5px; }
    .fg { margin-bottom:14px; }

    /* RESULT BOX */
    .result-box { background:linear-gradient(135deg,#0a1628,#1a3d6b); border-radius:14px; padding:24px; color:#fff; }
    .result-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:13px; }
    .result-row:last-child { border:none; }
    .result-total { font-family:var(--font-brand); font-weight:900; font-size:28px; color:#22c55e; }
    .result-anticipo { font-family:var(--font-brand); font-weight:700; font-size:18px; color:#f59e0b; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center; z-index:1000; backdrop-filter:blur(5px); }
    .modal-overlay.hidden { display:none; }
    .modal { background:var(--card-bg); border-radius:var(--card-radius); padding:28px; width:100%; max-width:520px; max-height:88vh; overflow-y:auto; color:var(--text-dark); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
    .modal-title { font-family:var(--font-brand); font-size:12px; font-weight:700; letter-spacing:1.5px; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid var(--border-card); }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border-card); }

    /* TOAST */
    .toast { position:fixed; bottom:24px; right:24px; background:#1e293b; color:#fff; padding:12px 20px; border-radius:10px; font-size:13px; font-weight:500; box-shadow:0 4px 20px rgba(0,0,0,0.4); z-index:2000; border-left:3px solid var(--blue-ms); }
    .toast.hidden { display:none; }

    /* UTILS */
    .flex { display:flex; } .ic { align-items:center; } .jb { justify-content:space-between; }
    .g8{gap:8px;} .g12{gap:12px;} .g16{gap:16px;}
    .mt8{margin-top:8px;} .mt16{margin-top:16px;} .mt20{margin-top:20px;}
    .mb16{margin-bottom:16px;} .mb20{margin-bottom:20px;}
    .tr{text-align:right;} .tc{text-align:center;} .w100{width:100%;}
    .hidden{display:none!important;}
    .divider { border:none; border-top:1px solid var(--border-card); margin:16px 0; }
  </style>
</head>
<body>

<script>
/* ============================================================
   METARCO · COTIZADOR DE GRÚAS · v2.0
   Admin: a.medina@metarco.com.mx
   Sync: OneDrive via Microsoft Graph API
============================================================ */

const CFG = {
  clientId: '6f7f3d07-3e40-4396-8f76-36d0f818d72d',
  tenantId: '3fce0139-013b-4c64-a04d-8605a9eb8088',
  admins:   ['a.medina@metarco.com.mx'],
  scopes:   ['Files.ReadWrite', 'User.Read'],
  fileCot:  'METARCO/METARCO_Cotizador_Datos.json',
  fileDash: 'METARCO/METARCO_Control_Gruas_Datos.json'
};

const TARIFAS = {
  T1: { Ligero: 1000, Pesado: 1200, Arrastre: 1000 },
  T2: { Ligero: 1250, Pesado: 1400, Arrastre: 1200 }
};
const ARRASTRE_KM = 46;
const PERIODOS = { Hora: 1.0, Día: 0.9, Semana: 0.8, Mes: 0.7 };
const DOC_FACTOR = { Básico: 0, Medios: 0.15, Especial: 0.30 };
const MANIOBRIST_DIA = 600;
const IVA = 0.16;
const MIN_HRS = 3;

const msal_app = new msal.PublicClientApplication({
  auth: {
    clientId: CFG.clientId,
    authority: `https://login.microsoftonline.com/${CFG.tenantId}`,
    redirectUri: 'https://arme183.github.io/metarco-gruas/METARCO_Cotizador.html',
    navigateToLoginRequestUrl: false
  },
  cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false }
});

let S = { user: null, role: null, data: null, section: 'historial', saveTimer: null, currentQuote: null };

function defaultData() {
  return { version: '2.0', lastModified: new Date().toISOString(), clientes: [], cotizaciones: [] };
}

// --- AUTH ---
async function login() {
  try {
    const r = await msal_app.loginPopup({ scopes: CFG.scopes, prompt: 'select_account' });
    await bootApp(r.account);
  } catch(e) {
    const el = document.getElementById('loginError');
    el.textContent = 'No se pudo iniciar sesión. Usa tu cuenta @metarco.com.mx.';
    el.classList.remove('hidden');
  }
}
async function logout() {
  await msal_app.logoutPopup();
  S = { user:null, role:null, data:null, section:'historial', saveTimer:null, currentQuote:null };
  document.getElementById('appShell').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
}
async function getToken() {
  const acc = msal_app.getAllAccounts();
  if (!acc.length) return null;
  try {
    const r = await msal_app.acquireTokenSilent({ scopes: CFG.scopes, account: acc[0] });
    return r.accessToken;
  } catch {
    const r = await msal_app.acquireTokenPopup({ scopes: CFG.scopes });
    return r.accessToken;
  }
}

// --- GRAPH ---
const GRAPH = 'https://graph.microsoft.com/v1.0';
async function readOD(path) {
  const tok = await getToken();
  const r = await fetch(`${GRAPH}/me/drive/root:/${path}:/content`, { headers:{ Authorization:`Bearer ${tok}` } });
  if (r.status === 404) return null;
  return await r.json();
}
async function writeOD(path, data) {
  const tok = await getToken();
  data.lastModified = new Date().toISOString();
  await fetch(`${GRAPH}/me/drive/root:/${path}:/content`, {
    method: 'PUT',
    headers: { Authorization:`Bearer ${tok}`, 'Content-Type':'application/json' },
    body: JSON.stringify(data, null, 2)
  });
}

async function loadData() {
  sync('syncing','Cargando...');
  try {
    const d = await readOD(CFG.fileCot);
    sync('ok','Sincronizado');
    return d || defaultData();
  } catch { sync('error','Sin conexión'); return defaultData(); }
}
async function saveData() {
  sync('syncing','Guardando...');
  try {
    await writeOD(CFG.fileCot, S.data);
    sync('ok','Guardado ✓');
    setTimeout(() => sync('ok','Sincronizado'), 3000);
  } catch { sync('error','Error al guardar'); }
}
function scheduleSave() {
  if (S.saveTimer) clearTimeout(S.saveTimer);
  S.saveTimer = setTimeout(saveData, 1500);
}
function sync(status, text) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot' + (status==='syncing' ? ' syncing' : status==='error' ? ' error' : '');
  txt.textContent = text;
}

// --- BOOT ---
async function bootApp(account) {
  const email = (account.username||'').toLowerCase();
  const isAdmin = CFG.admins.map(e=>e.toLowerCase()).includes(email);
  S.user = account;
  S.role = isAdmin ? 'admin' : 'operador';

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appShell').classList.add('visible');
  document.getElementById('userName').textContent = account.name || account.username;
  document.getElementById('userAvatar').textContent = (account.name || account.username)[0].toUpperCase();
  document.getElementById('userRoleLbl').innerHTML = `<span class="badge b-${S.role}">${isAdmin?'Admin':'Operador'}</span>`;

  document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !isAdmin));

  S.data = await loadData();
  navigate(isAdmin ? 'nueva' : 'historial');
}

// --- NAVIGATE ---
function navigate(sec) {
  if (S.role !== 'admin' && sec === 'nueva') sec = 'historial';
  S.section = sec;
  document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.sec === sec));
  document.getElementById('mainContent').innerHTML = SECTIONS[sec] ? SECTIONS[sec]() : '';
}

// --- CÁLCULO ---
function calcCotizacion(f) {
  const tarifaBase = TARIFAS[f.grua][f.tipo];
  const factorPer  = PERIODOS[f.periodo];
  let horas = parseFloat(f.cantidad) || 0;

  // Mínimo 3 horas
  if (f.tipo !== 'Arrastre' && horas < MIN_HRS) horas = MIN_HRS;

  let subtotalGrua = 0;
  if (f.tipo === 'Arrastre' && f.cobrarPorKm) {
    subtotalGrua = tarifaBase * horas + ARRASTRE_KM * (parseFloat(f.km)||0);
  } else {
    subtotalGrua = tarifaBase * horas * factorPer;
  }

  const subtotalManiob = MANIOBRIST_DIA * (parseFloat(f.maniobristasDias)||0) * (parseInt(f.maniobristasNum)||0);
  const factorDoc = DOC_FACTOR[f.documentacion] || 0;
  const subtotalDoc = subtotalGrua * factorDoc;
  const subtotal = subtotalGrua + subtotalManiob + subtotalDoc;
  const iva = subtotal * IVA;
  const total = subtotal + iva;
  const anticipo = total * 0.5;

  return { tarifaBase, horas, subtotalGrua, subtotalManiob, subtotalDoc, subtotal, iva, total, anticipo };
}

function toggleArrastre() {
  const tipo = document.getElementById('qTipo').value;
  const arrOpts = document.getElementById('arrOpts');
  arrOpts.classList.toggle('hidden', tipo !== 'Arrastre');
}

document.addEventListener('change', function(e) {
  if (e.target.name === 'arrMode') {
    document.getElementById('kmField').style.display = e.target.value === 'km' ? 'block' : 'none';
    recalc();
  }
});

function getFormData() {
  const arrMode = document.querySelector('input[name="arrMode"]:checked');
  return {
    grua:           document.getElementById('qGrua')?.value || 'T1',
    tipo:           document.getElementById('qTipo')?.value || 'Ligero',
    periodo:        document.getElementById('qPeriodo')?.value || 'Hora',
    cantidad:       document.getElementById('qCantidad')?.value || 3,
    maniobristasNum:document.getElementById('qManiobNum')?.value || 0,
    maniobristasDias:document.getElementById('qManiobDias')?.value || 0,
    documentacion:  document.getElementById('qDoc')?.value || 'Básico',
    cobrarPorKm:    arrMode?.value === 'km',
    km:             document.getElementById('qKm')?.value || 0
  };
}

function recalc() {
  try {
    const f = getFormData();
    const r = calcCotizacion(f);
    document.getElementById('rTarifa').textContent   = `${f.grua} ${f.tipo} — ${MXN(f.tarifaBase||TARIFAS[f.grua][f.tipo])}/hr`;
    document.getElementById('rGrua').textContent     = MXN(r.subtotalGrua);
    document.getElementById('rMan').textContent      = MXN(r.subtotalManiob);
    document.getElementById('rDoc').textContent      = MXN(r.subtotalDoc);
    document.getElementById('rSub').textContent      = MXN(r.subtotal);
    document.getElementById('rIva').textContent      = MXN(r.iva);
    document.getElementById('rTotal').textContent    = MXN(r.total);
    document.getElementById('rAnticipo').textContent = MXN(r.anticipo);
    if (document.getElementById('rManRow')) document.getElementById('rManRow').style.display = r.subtotalManiob > 0 ? '' : 'none';
    if (document.getElementById('rDocRow')) document.getElementById('rDocRow').style.display = r.subtotalDoc > 0 ? '' : 'none';
  } catch(e) {}
}

function autoFillCliente(id) {
  const c = (S.data.clientes||[]).find(x=>x.id===id);

  document.getElementById('qNombre').value = c.nombre || '';
  document.getElementById('qRFC').value    = c.rfc    || '';
  document.getElementById('qTel').value    = c.tel    || '';
  document.getElementById('qEmail').value  = c.email  || '';

function getCotizacionData() {
  const f = getFormData();

function enviarEmail() {
  const to     = document.getElementById('eTo').value;

  const asunto = encodeURIComponent(document.getElementById('eAsunto').value);

  return `

    <div class="stat-card"><div class="stat-val" style="color:#f59e0b;">${totales.EJECUTADA}</div><div class="stat-lbl">Ejecutadas</div></div>
    <div class="stat-card"><div class="stat-val" style="color:#10b981;font-size:16px;">${MXN(totalFacturado)}</div><div class="stat-lbl">Facturado</div></div>
  </div>

  <div class="card" style="padding:0;overflow:hidden;">
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Folio</th><th>Fecha</th><th>Cliente</th><th>Servicio</th><th>Estado</th><th class="tr">Total</th><th></th></tr></thead>
        <tbody>
          ${!cots.length ? `<tr class="tr-empty"><td colspan="7">Sin cotizaciones. Crea la primera desde "Nueva cotización".</td></tr>` :
            cots.map(c => `
            <tr>
              <td style="font-family:'Orbitron';font-size:11px;font-weight:700;">${c.folio||'—'}</td>
              <td>${c.fecha||'—'}</td>
              <td style="font-weight:500;">${c.cliente?.nombre||'—'}</td>
              <td><span class="badge b-${(c.servicio?.grua||'').toLowerCase()}">${c.servicio?.grua||'—'}</span> ${c.servicio?.tipo||'—'}</td>
              <td>
                <select class="sel" style="padding:4px 8px;font-size:11px;width:auto;" onchange="cambiarEstado('${c.id}',this.value)">
                  ${estados.map(e=>`<option value="${e}" ${c.estado===e?'selected':''}>${e}</option>`).join('')}
                </select>
              </td>
              <td class="tr" style="font-weight:700;">${MXN(c.calculo?.total)}</td>
              <td class="tr" style="white-space:nowrap;">
                <button class="btn btn-outline btn-sm" onclick="verPDF('${c.id}')">PDF</button>
                <button class="btn btn-outline btn-sm admin-only" onclick="deleteCot('${c.id}')">✕</button>
              </td>
            </tr>`).join('')}

      </table>

}

function cambiarEstado(id, estado) {
  const c = S.data.cotizaciones.find(x=>x.id===id);
  if (c) { c.estado = estado; scheduleSave(); toast('Estado actualizado'); }
}
function deleteCot(id) {
  if (!confirm('¿Eliminar esta cotización?')) return;
  S.data.cotizaciones = S.data.cotizaciones.filter(x=>x.id!==id);
  scheduleSave(); navigate('historial'); toast('Cotización eliminada');
}
function verPDF(id) {
  const c = S.data.cotizaciones.find(x=>x.id===id);
  if (!c) return;
  // Re-generate PDF from saved data
  toast('Regenerando PDF...');
}

// Export to Excel
function exportExcel() {
  const cots = S.data.cotizaciones || [];
  const rows = cots.map(c => ({
    Folio: c.folio, Fecha: c.fecha, Estado: c.estado,
    Cliente: c.cliente?.nombre, RFC: c.cliente?.rfc,
    Grúa: c.servicio?.grua, Tipo: c.servicio?.tipo,
    Horas: c.calculo?.horas, Subtotal: c.calculo?.subtotal,
    IVA: c.calculo?.iva, Total: c.calculo?.total, Anticipo: c.calculo?.anticipo
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Cotizaciones');
  XLSX.writeFile(wb, `METARCO_Cotizaciones_${today()}.xlsx`);
  toast('Excel exportado');
}

// Export to Dashboard (writes to Control de Grúas JSON)
async function exportDashboard() {
  const ejecutadas = S.data.cotizaciones.filter(c => ['EJECUTADA','COBRADA'].includes(c.estado));
  if (!ejecutadas.length) { toast('No hay servicios ejecutados o cobrados para exportar'); return; }

  sync('syncing','Exportando al Dashboard...');
  try {
    let dashData = await readOD(CFG.fileDash);
    if (!dashData) { toast('No se encontró el archivo del Dashboard en OneDrive'); sync('error','Error'); return; }

    const existingIds = new Set((dashData.servicios||[]).map(s=>s.cotId));
    let nuevos = 0;

    ejecutadas.forEach(c => {
      if (!existingIds.has(c.id)) {
        dashData.servicios = dashData.servicios || [];
        dashData.servicios.unshift({
          id: uid(), cotId: c.id,
          fecha: c.fecha, grua: c.servicio?.grua,
          cliente: c.cliente?.nombre, tipo: c.servicio?.tipo,
          horas: c.calculo?.horas || 0, km: 0,
          ingreso: c.calculo?.total || 0, costo: 0
        });
        nuevos++;
      }
    });

    await writeOD(CFG.fileDash, dashData);
    sync('ok','Sincronizado');
    toast(`${nuevos} servicio(s) exportado(s) al Dashboard`);
  } catch(e) {
    sync('error','Error al exportar');
    toast('Error al conectar con el Dashboard');
  }
}

function deleteCliente(id) {
